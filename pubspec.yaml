name: ticktick
description: A local-first task management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.30
  # Routing
  go_router: ^14.6.2
  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Notifications
  flutter_local_notifications: ^18.0.1
  # File operations
  file_picker: ^8.1.6
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  # Date formatting
  intl: ^0.19.0
  # Utilities
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true
